project:
  type: book
  output-dir: _book

book:
  title: 'The Statistics of Blockchain for Public Health'
  subtitle: 'Trust-minimized data integrity for health-sciences research'
  author: "Ronald 'Ryy' G. Thomas"
  date: today
  date-format: 'YYYY-MM-DD'

  cover-image: images/cover.png
  favicon: images/favicon.png

  site-url: https://blockchain.rgtlab.org
  repo-url: https://github.com/rgt47/blockchain-curriculum
  repo-branch: main
  repo-actions: [edit, issue]

  search: true
  page-navigation: true
  bread-crumbs: true
  sidebar:
    style: docked
    collapse-level: 1

  chapters:
    - half-title.qmd
    - copyright.qmd
    - index.qmd
    - preface.qmd
    - conventions.qmd
    - 00-intro.qmd

    - part: 'Foundations'
      chapters:
        - 01-consensus-problem.qmd
        - 02-cryptographic-primitives.qmd

    - part: 'Bitcoin and Nakamoto Consensus'
      chapters:
        - 03-proof-of-work.qmd
        - 04-mining-statistics.qmd
        - 05-security-economics.qmd

    - part: 'Ethereum and Programmable State'
      chapters:
        - 06-ethereum-evm.qmd
        - 07-defi.qmd
        - 08-mev.qmd

    - part: 'Proof-of-Stake and On-Chain Data'
      chapters:
        - 09-proof-of-stake.qmd
        - 10-onchain-data.qmd

    - references.qmd

  appendices:
    - appendix-algebra.qmd
    - credits.qmd
    - colophon.qmd

format:
  html:
    theme:
      - cosmo
      - blockchain.scss
    code-annotations: hover
    code-link: true
    code-copy: hover
    code-overflow: wrap
    code-tools:
      source: repo
      toggle: false
    code-block-bg: true
    code-block-border-left: '#33356b'
    highlight-style: arrow
    fig-width: 7
    fig-height: 4.5
    fig-align: center
    tbl-cap-location: top
    toc-depth: 3
    anchor-sections: true
    smooth-scroll: true

  pdf:
    documentclass: scrbook
    classoption: [11pt]
    toc: false
    code-annotations: below
    highlight-style: arrow
    geometry:
      - paperwidth=6.5in
      - paperheight=9in
      - top=0.9in
      - bottom=0.9in
      - inner=0.9in
      - outer=0.7in
    template-partials:
      - partials/before-body.tex
    include-in-header:
      text: |
        \usepackage{fontspec}
        \usepackage{graphicx}
        \setmonofont{DejaVu Sans Mono}[Scale=0.9]
        \newenvironment{bookepigraph}{\par\begin{flushright}\small}{\end{flushright}\par\medskip}

bibliography: references.bib
csl: https://www.zotero.org/styles/apa

execute:
  freeze: auto
  echo: true
  warning: false
  message: false

knitr:
  opts_chunk:
    comment: '#>'
    collapse: true
    fig.retina: 2
    dpi: 150
